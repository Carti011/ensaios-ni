# Mapeamento de canal físico -> conversão para unidade de engenharia.
#
# Copie para `config/canais.toml` (ignorado no git) e preencha com os
# valores REAIS fornecidos pelo dono do hardware. O nome de cada canal
# (ex.: "cDAQ9184-1820306Mod1/ai0") vem do NI-MAX.
#
# Formas de conversão por canal (espelham a Aferição do AqDados / Custom Scales do NI-DAQmx):
#   - linear:       valor = ganho * volts + offset      (sensor com sensibilidade conhecida)
#   - por pontos:   pontos = [[volts, valor], ...]       (calibração empírica do dono; ADR-006)
#       metodo = "regressao" (PADRÃO) -> ajusta UMA reta a N pontos (mínimos quadrados) e
#                 reporta a correlação. É a "Aferição por Regressão Linear" do AqDados.
#       metodo = "segmento"           -> interpola entre os pontos (passa por cada um, com
#                 clamp fora da faixa). Use só para sensores comprovadamente não-lineares.
# Use linear OU pontos. Ver docs/adr/006-calibracao-por-pontos.md e docs/referencia-lynx.md.
#
# rotulo = "Carga" (opcional): nome humano do canal — o "Nome do Sinal" do AqDados, que o dono
#   reconhece (ex.: "Carga", "Sg1 bico"). A UI exibe o rótulo; sem ele, cai no endereço físico
#   (ex.: "Mod1/ai0"), que vem do NI-MAX e o dono não reconhece. Ver docs/tarefas-futuras.md §3.

# célula de carga fictícia (linear): 0 V = 0 kgf, 10 V = 1000 kgf
[canais."Mod1/ai0"]
tipo = "tensao"
unidade = "kgf"
rotulo = "Carga"
ganho = 100.0
offset = 0.0

# transdutor de pressão fictício (linear): 0 V = 0 bar, 10 V = 250 bar
[canais."Mod1/ai1"]
tipo = "tensao"
unidade = "bar"
rotulo = "Pressão"
ganho = 25.0
offset = 0.0

# LVDT fictício calibrado por REGRESSÃO (default): aplicou deslocamentos conhecidos e leu a
# tensão; os pontos têm leve dispersão de medição, e a regressão ajusta a melhor reta (~10 mm/V).
[canais."Mod2/ai0"]
tipo = "tensao"
unidade = "mm"
rotulo = "Deslocamento"
pontos = [[0.0, 0.0], [2.5, 25.1], [5.0, 49.8], [7.5, 75.2]]

# Sensor fictício de resposta NÃO-LINEAR calibrado por SEGMENTO (opt-in): a curva muda de
# inclinação entre os pontos, então interpola por trecho em vez de ajustar uma reta única.
[canais."Mod2/ai1"]
tipo = "tensao"
unidade = "mm"
metodo = "segmento"
pontos = [[0.0, 0.0], [2.5, 20.0], [5.0, 50.0], [7.5, 90.0]]

# Acelerômetro Dytran 7523A1 (real, do dono): triaxial DC-response, 550 mV/g, ±2g, 5 V DC.
# Liga no 9205 como tensão; conversão g = volts / 0,550 (ganho ≈ 1,818 g/V).
# Exemplo (comentado — sensor por eixo, descomentar ao usar):
# [canais."Mod1/ai2"]
# tipo = "tensao"
# unidade = "g"
# ganho = 1.818
# offset = 0.0

# Strain (9235): o driver já devolve strain adimensional (gage factor/ponte aplicados pelo
# DAQmx — ver ConfigStrain em aquisicao/daqmx.py). Para microstrain, basta um canal linear
# com ganho 1.000.000. tipo = "strain" faz o ensaio ler este canal na task do 9235.
[canais."Mod3/ai0"]
tipo = "strain"
unidade = "µε"
rotulo = "Sg1 bico"
ganho = 1000000.0
offset = 0.0
